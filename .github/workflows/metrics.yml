name: Metrics

on:
  # Refresh once a day
  schedule:
    - cron: "0 2 * * *"
  # Allow manual runs from the Actions tab (use this for the first run)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub metrics
        uses: lowlighter/metrics@latest
        with:
          # A Personal Access Token (classic) with the "repo" scope,
          # saved as a repository secret named METRICS_TOKEN.
          token: ${{ secrets.METRICS_TOKEN }}
          user: ShresthSamyak

          # Commit the rendered SVG back into the repo at this path
          filename: assets/metrics.svg
          output_action: commit
          committer_branch: main

          config_timezone: Asia/Kolkata

          # Compact: header only (name, followers, contributed) — no bulky repo block
          base: header

          # Top languages — analyzed by the code YOU actually wrote (in-depth),
          # not raw repo bytes, so forks and generated files don't inflate JavaScript.
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_ignored: html, css, scss, makefile, dockerfile
          plugin_languages_limit: 8
          plugin_languages_details: percentage

          # Contribution activity calendar (the "graph")
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
