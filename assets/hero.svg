<svg width="860" height="220" viewBox="0 0 860 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Shresth Samyak — AI Engineer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#0a0e14"/>
    </linearGradient>

    <!-- Moving shimmer for the name -->
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0" spreadMethod="reflect" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#58a6ff"/>
      <stop offset="0.5" stop-color="#a855f7"/>
      <stop offset="1" stop-color="#38bdf8"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-1 0; 1 0" dur="5s" repeatCount="indefinite"/>
    </linearGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#58a6ff"/>
      <stop offset="0.5" stop-color="#a855f7"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>

    <!-- Radial glow that breathes behind the name -->
    <radialGradient id="glow" cx="0.28" cy="0.5" r="0.55">
      <stop offset="0" stop-color="#1f6feb" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#1f6feb" stop-opacity="0"/>
    </radialGradient>

    <!-- Sweeping scan highlight -->
    <linearGradient id="scan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <clipPath id="card">
      <rect x="1" y="1" width="858" height="218" rx="14"/>
    </clipPath>
  </defs>

  <!-- Card -->
  <rect x="1" y="1" width="858" height="218" rx="14" fill="url(#bg)" stroke="#21262d" stroke-width="1"/>

  <g clip-path="url(#card)">
    <!-- Breathing glow -->
    <rect x="0" y="0" width="500" height="220" fill="url(#glow)">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="6s" repeatCount="indefinite"/>
    </rect>

    <!-- Sweeping scan -->
    <rect x="-160" y="0" width="160" height="220" fill="url(#scan)">
      <animateTransform attributeName="transform" type="translate" values="-160 0; 1020 0" dur="7s" repeatCount="indefinite"/>
    </rect>

    <!-- Faint grid dots -->
    <g fill="#30363d" opacity="0.5">
      <circle cx="700" cy="40" r="1.4"/><circle cx="730" cy="40" r="1.4"/><circle cx="760" cy="40" r="1.4"/><circle cx="790" cy="40" r="1.4"/><circle cx="820" cy="40" r="1.4"/>
      <circle cx="700" cy="70" r="1.4"/><circle cx="730" cy="70" r="1.4"/><circle cx="760" cy="70" r="1.4"/><circle cx="790" cy="70" r="1.4"/><circle cx="820" cy="70" r="1.4"/>
      <circle cx="700" cy="100" r="1.4"/><circle cx="730" cy="100" r="1.4"/><circle cx="760" cy="100" r="1.4"/><circle cx="790" cy="100" r="1.4"/><circle cx="820" cy="100" r="1.4"/>
    </g>
  </g>

  <!-- Top + bottom accent lines with moving gradient -->
  <rect x="15" y="1" width="830" height="2" rx="1" fill="url(#accent)" opacity="0.85">
    <animate attributeName="opacity" values="0.5;0.95;0.5" dur="5s" repeatCount="indefinite"/>
  </rect>
  <rect x="15" y="217" width="830" height="2" rx="1" fill="url(#accent)" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="5s" begin="2.5s" repeatCount="indefinite"/>
  </rect>

  <!-- Window dots -->
  <circle cx="34" cy="34" r="6" fill="#ff5f57">
    <animate attributeName="opacity" values="1;0.6;1" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="54" cy="34" r="6" fill="#febc2e">
    <animate attributeName="opacity" values="1;0.6;1" dur="3s" begin="0.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="74" cy="34" r="6" fill="#28c840">
    <animate attributeName="opacity" values="1;0.6;1" dur="3s" begin="0.8s" repeatCount="indefinite"/>
  </circle>
  <text x="98" y="39" font-family="'Courier New', monospace" font-size="12" fill="#6e7681">~/shresth-samyak — profile</text>

  <!-- Name with shimmer -->
  <text x="40" y="108" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="44" font-weight="700" fill="url(#shine)" letter-spacing="0.5">Shresth Samyak</text>

  <!-- Underline reveal -->
  <rect x="40" y="122" height="3" rx="1.5" fill="url(#accent)" width="0">
    <animate attributeName="width" values="0;345" keyTimes="0;1" dur="1.1s" begin="0.2s" fill="freeze" calcMode="spline" keySplines="0.22 1 0.36 1"/>
  </rect>

  <!-- Static tagline -->
  <text x="40" y="154" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="16" fill="#8b949e">
    <tspan fill="#58a6ff" font-weight="600">AI Engineer</tspan><tspan fill="#6e7681"> — I build AI systems where correctness is measurable</tspan>
  </text>

  <!-- Cycling specialty line -->
  <text x="40" y="192" font-family="'Courier New', monospace" font-size="18" fill="#3fb950" font-weight="700">&#8250;</text>

  <g opacity="0">
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.03;0.22;0.25;1" dur="12s" begin="0s" repeatCount="indefinite"/>
    <text x="64" y="192" font-family="'Courier New', monospace" font-size="18" fill="#c9d1d9">Computer Vision Systems</text>
    <rect x="321" y="177" width="9" height="19" fill="#58a6ff"><animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/></rect>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.03;0.22;0.25;1" dur="12s" begin="3s" repeatCount="indefinite"/>
    <text x="64" y="192" font-family="'Courier New', monospace" font-size="18" fill="#c9d1d9">LLM Inference Optimization</text>
    <rect x="354" y="177" width="9" height="19" fill="#58a6ff"><animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/></rect>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.03;0.22;0.25;1" dur="12s" begin="6s" repeatCount="indefinite"/>
    <text x="64" y="192" font-family="'Courier New', monospace" font-size="18" fill="#c9d1d9">MCP &amp; Agent Security</text>
    <rect x="288" y="177" width="9" height="19" fill="#58a6ff"><animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/></rect>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.03;0.22;0.25;1" dur="12s" begin="9s" repeatCount="indefinite"/>
    <text x="64" y="192" font-family="'Courier New', monospace" font-size="18" fill="#c9d1d9">RAG &amp; Retrieval Systems</text>
    <rect x="321" y="177" width="9" height="19" fill="#58a6ff"><animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/></rect>
  </g>

  <!-- Floating accent dots -->
  <circle cx="795" cy="150" r="3" fill="#58a6ff" opacity="0.6">
    <animate attributeName="cy" values="150;135;150" dur="6s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="820" cy="175" r="2.5" fill="#a855f7" opacity="0.6">
    <animate attributeName="cy" values="175;160;175" dur="7s" begin="1s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="7s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="765" cy="185" r="2" fill="#38bdf8" opacity="0.5">
    <animate attributeName="cy" values="185;173;185" dur="5.5s" begin="0.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
    <animate attributeName="opacity" values="0.5;0.15;0.5" dur="5.5s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
</svg>
