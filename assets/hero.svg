<svg width="860" height="210" viewBox="0 0 860 210" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Shresth Samyak — AI Engineer">
  <defs>
    <!-- Card background -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#0a0e14"/>
    </linearGradient>

    <!-- Moving shimmer for the name -->
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0" spreadMethod="reflect" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#58a6ff"/>
      <stop offset="0.5" stop-color="#a855f7"/>
      <stop offset="1" stop-color="#38bdf8"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-1 0; 1 0" dur="5s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- Top accent line -->
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#58a6ff"/>
      <stop offset="0.5" stop-color="#a855f7"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>

  <!-- Card -->
  <rect x="1" y="1" width="858" height="208" rx="14" fill="url(#bg)" stroke="#21262d" stroke-width="1"/>

  <!-- Top accent line, fades in and pulses subtly -->
  <rect x="15" y="1" width="830" height="2" rx="1" fill="url(#accent)" opacity="0.0">
    <animate attributeName="opacity" values="0;0.9;0.5;0.9" keyTimes="0;0.3;0.65;1" dur="6s" repeatCount="indefinite"/>
  </rect>

  <!-- Window dots -->
  <circle cx="34" cy="34" r="6" fill="#ff5f57"/>
  <circle cx="54" cy="34" r="6" fill="#febc2e"/>
  <circle cx="74" cy="34" r="6" fill="#28c840"/>
  <text x="98" y="39" font-family="'Courier New', monospace" font-size="12" fill="#6e7681">~/shresth-samyak · profile</text>

  <!-- Name with shimmer -->
  <text x="40" y="104" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="42" font-weight="700" fill="url(#shine)" letter-spacing="0.5">Shresth Samyak</text>

  <!-- Underline reveal under the name -->
  <rect x="40" y="118" height="3" rx="1.5" fill="url(#accent)" width="0">
    <animate attributeName="width" values="0;330" keyTimes="0;1" dur="1.1s" begin="0.2s" fill="freeze" calcMode="spline" keySplines="0.22 1 0.36 1"/>
  </rect>

  <!-- Static tagline -->
  <text x="40" y="150" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="16" fill="#8b949e">
    <tspan fill="#58a6ff" font-weight="600">AI Engineer</tspan><tspan fill="#6e7681"> — I build AI systems where correctness is measurable</tspan>
  </text>

  <!-- Cycling specialty line: prompt + rotating text + blinking cursor -->
  <text x="40" y="188" font-family="'Courier New', monospace" font-size="18" fill="#3fb950" font-weight="700">&#8250;</text>

  <!-- Phrase 1: Computer Vision Systems -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.03;0.22;0.25;1" dur="12s" begin="0s" repeatCount="indefinite"/>
    <text x="64" y="188" font-family="'Courier New', monospace" font-size="18" fill="#c9d1d9">Computer Vision Systems</text>
    <rect x="321" y="173" width="9" height="19" fill="#58a6ff">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Phrase 2: LLM Inference Optimization -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.03;0.22;0.25;1" dur="12s" begin="3s" repeatCount="indefinite"/>
    <text x="64" y="188" font-family="'Courier New', monospace" font-size="18" fill="#c9d1d9">LLM Inference Optimization</text>
    <rect x="354" y="173" width="9" height="19" fill="#58a6ff">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Phrase 3: MCP & Agent Security -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.03;0.22;0.25;1" dur="12s" begin="6s" repeatCount="indefinite"/>
    <text x="64" y="188" font-family="'Courier New', monospace" font-size="18" fill="#c9d1d9">MCP &amp; Agent Security</text>
    <rect x="288" y="173" width="9" height="19" fill="#58a6ff">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Phrase 4: RAG & Retrieval Systems -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.03;0.22;0.25;1" dur="12s" begin="9s" repeatCount="indefinite"/>
    <text x="64" y="188" font-family="'Courier New', monospace" font-size="18" fill="#c9d1d9">RAG &amp; Retrieval Systems</text>
    <rect x="321" y="173" width="9" height="19" fill="#58a6ff">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Subtle floating accent dots -->
  <circle cx="790" cy="70" r="3" fill="#58a6ff" opacity="0.5">
    <animate attributeName="cy" values="70;58;70" dur="6s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
    <animate attributeName="opacity" values="0.5;0.15;0.5" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="815" cy="120" r="2.5" fill="#a855f7" opacity="0.5">
    <animate attributeName="cy" values="120;108;120" dur="7s" begin="1s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
    <animate attributeName="opacity" values="0.5;0.2;0.5" dur="7s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="760" cy="150" r="2" fill="#38bdf8" opacity="0.4">
    <animate attributeName="cy" values="150;140;150" dur="5.5s" begin="0.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="5.5s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
</svg>
