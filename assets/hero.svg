<svg width="860" height="200" viewBox="0 0 860 200" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Shresth Samyak — AI Engineer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#0b0f14"/>
    </linearGradient>
  </defs>

  <!-- Card -->
  <rect x="1" y="1" width="858" height="198" rx="12" fill="url(#bg)" stroke="#21262d" stroke-width="1"/>

  <!-- Slim left accent bar -->
  <rect x="1" y="1" width="4" height="198" rx="2" fill="#58a6ff"/>

  <!-- Window dots -->
  <circle cx="40" cy="34" r="5.5" fill="#ff5f57"/>
  <circle cx="59" cy="34" r="5.5" fill="#febc2e"/>
  <circle cx="78" cy="34" r="5.5" fill="#28c840"/>
  <text x="100" y="38" font-family="'Courier New', monospace" font-size="12" fill="#6e7681">shresth@dev — ~/profile</text>

  <!-- Name (solid, clean) -->
  <text x="40" y="102" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="42" font-weight="700" fill="#f0f6fc" letter-spacing="0.3">Shresth Samyak</text>

  <!-- Single thin accent underline, drawn once -->
  <rect x="40" y="116" height="2.5" rx="1.25" fill="#58a6ff" width="0">
    <animate attributeName="width" values="0;300" dur="0.9s" begin="0.3s" fill="freeze" calcMode="spline" keySplines="0.22 1 0.36 1"/>
  </rect>

  <!-- Tagline -->
  <text x="40" y="146" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" fill="#8b949e">
    <tspan fill="#58a6ff" font-weight="600">AI Engineer</tspan><tspan fill="#6e7681"> — building AI systems where correctness is measurable</tspan>
  </text>

  <!-- Cycling specialty line: prompt + rotating text + blinking cursor -->
  <text x="40" y="180" font-family="'Courier New', monospace" font-size="17" fill="#3fb950" font-weight="700">&#8250;</text>

  <g opacity="0">
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.03;0.22;0.25;1" dur="12s" begin="0s" repeatCount="indefinite"/>
    <text x="62" y="180" font-family="'Courier New', monospace" font-size="17" fill="#c9d1d9">Computer Vision Systems</text>
    <rect x="303" y="166" width="8" height="18" fill="#58a6ff"><animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/></rect>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.03;0.22;0.25;1" dur="12s" begin="3s" repeatCount="indefinite"/>
    <text x="62" y="180" font-family="'Courier New', monospace" font-size="17" fill="#c9d1d9">LLM Inference Optimization</text>
    <rect x="335" y="166" width="8" height="18" fill="#58a6ff"><animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/></rect>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.03;0.22;0.25;1" dur="12s" begin="6s" repeatCount="indefinite"/>
    <text x="62" y="180" font-family="'Courier New', monospace" font-size="17" fill="#c9d1d9">MCP &amp; Agent Security</text>
    <rect x="272" y="166" width="8" height="18" fill="#58a6ff"><animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/></rect>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.03;0.22;0.25;1" dur="12s" begin="9s" repeatCount="indefinite"/>
    <text x="62" y="180" font-family="'Courier New', monospace" font-size="17" fill="#c9d1d9">RAG &amp; Retrieval Systems</text>
    <rect x="303" y="166" width="8" height="18" fill="#58a6ff"><animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/></rect>
  </g>
</svg>
