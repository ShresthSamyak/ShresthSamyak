<svg width="860" height="120" viewBox="0 0 860 120" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="GitHub metrics placeholder">
  <rect x="1" y="1" width="858" height="118" rx="12" fill="#0d1117" stroke="#21262d" stroke-width="1"/>
  <rect x="1" y="1" width="4" height="118" rx="2" fill="#58a6ff"/>
  <text x="40" y="46" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#8b949e">Not yet activated</text>
  <text x="40" y="72" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#6e7681">Add the METRICS_TOKEN secret, then run the “Metrics” workflow once from the Actions tab.</text>
  <text x="40" y="92" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#6e7681">Real stats (commits, stars, PRs, languages, activity) replace this card and refresh daily.</text>
  <circle cx="822" cy="41" r="4" fill="#58a6ff"><animate attributeName="opacity" values="1;0.3;1" dur="1.4s" repeatCount="indefinite"/></circle>
</svg>
